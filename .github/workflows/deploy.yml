# Bonus A — CI/CD pipeline (.github/workflows/deploy.yml)
#
# TODO: Implement a lint -> test -> deploy workflow.
#   - lint:   ruff check on agent/ and client/
#   - test:   a smoke test that imports and compiles the graph
#   - deploy: ONLY on push to main; log the model, register a new UC version,
#             and update the serving endpoint. Use GitHub Secrets for
#             DATABRICKS_HOST / DATABRICKS_TOKEN. Add a workflow_dispatch trigger.

name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: install uv, sync deps, run `ruff check` and the smoke test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync
        
      - name: Install ruff
        run: pip install ruff

      - name: Lint agent/ and client/
        run: ruff check agent/ client/

      - name: Install pytest
        run: uv add --dev pytest

      - name: Smoke test — build graph with fake dependencies
        run: uv run pytest tests/test_smoke.py -v
          
  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: install deps and run `python deployment/deploy.py` with secrets

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync
      - name: Deploy model to Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          UC_CATALOG: "cs4603"
          UC_SCHEMA: "rag_data"
          MODEL_NAME: "effa_document_analyst"
          VECTOR_SEARCH_ENDPOINT: "effa-vs-endpoint"
          VECTOR_SEARCH_INDEX: "cs4603.rag_data.effa_analyst_index"
          SECRET_SCOPE: "cs4603-deploy"
          SERVING_ENDPOINT_NAME: "effa-document-analyst"
          EMBEDDINGS_ENDPOINT: "databricks-gte-large-en"
          DATABRICKS_MODEL: "databricks-meta-llama-3-3-70b-instruct"
        run: uv run python deployment/deploy.py
      
      - name: Print deployed model version and endpoint status
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          uv run python -c "
          from databricks.sdk import WorkspaceClient
          w = WorkspaceClient(host='${{ secrets.DATABRICKS_HOST }}', token='${{ secrets.DATABRICKS_TOKEN }}')
          ep = w.serving_endpoints.get('effa-document-analyst')
          print('Endpoint state:', ep.state.ready)

          
          
          
          
          for entity in ep.config.served_entities:
              print('Deployed model version:', entity.entity_version)
          "
